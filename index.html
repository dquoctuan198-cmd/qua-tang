<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món quà bí mật dành riêng cho Công Chúa ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 100%);
            color: #fff;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .snow {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 0;
            background: url('https://raw.githubusercontent.com/danielstuart14/CSS_Fades_And_Animations/master/snow.png');
            animation: fall 20s linear infinite; opacity: 0.6;
        }
        @keyframes fall {
            0% { background-position: 0px 0px; }
            100% { background-position: 500px 1000px; }
        }

        #gift-container {
            z-index: 10; text-align: center; cursor: pointer;
            transition: transform 0.5s, opacity 0.5s;
        }
        .gift-box { font-size: 80px; animation: pulse 1.5s infinite, glow 2s infinite alternate; }
        .click-text { margin-top: 20px; font-size: 20px; color: #d81b60; font-weight: bold; animation: blink 1s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes glow { from { text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; } to { text-shadow: 0 0 20px #ffaa00, 0 0 30px #ffaa00; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Vùng nội dung chính bao phủ toàn màn hình */
        #main-content {
            display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 5;
        }

        /* Lời nhắn đầu - Đưa lên góc trên */
        #message1 {
            position: absolute; top: 12%; width: 100%;
            font-family: 'Dancing Script', cursive;
            font-size: 32px; color: #c2185b;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            text-align: center; padding: 0 20px;
            opacity: 0; transition: opacity 1s ease-in-out; z-index: 6;
        }

        /* Lời nhắn cuối - Đưa xuống góc dưới */
        #final-message {
            position: absolute; bottom: 10%; width: 100%;
            font-family: 'Dancing Script', cursive;
            font-size: 45px; color: #d81b60; text-shadow: 0 0 10px #fff, 0 0 20px #ffdde1;
            opacity: 0; transition: all 1s ease-in-out; text-align: center; z-index: 10;
        }

        /* Vùng chứa ảnh - Trọng tâm giữa màn hình */
        .gallery {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; /* Để có thể vuốt qua thả tim */
        }

        /* Thiết kế ảnh Polaroid - Định vị chính giữa Center(0,0) */
        .polaroid {
            position: absolute; 
            width: 90px; height: 110px; /* Thu gọn chút để 12 ảnh không cắn lẹm vào nhau */
            background: white; padding: 4px 4px 15px 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            top: 50%; left: 50%; 
            margin-top: -55px; margin-left: -45px; /* Kéo tâm ảnh về chính giữa màn hình */
            opacity: 0;
            transform: translate(0, 0) scale(0);
            /* Dùng transform để di chuyển -> cực kỳ mượt mà trên Mobile */
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.2s ease, box-shadow 0.3s; 
            will-change: transform, opacity;
            pointer-events: auto; cursor: pointer;
        }
        .polaroid img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Hiệu ứng phóng to khi bấm vào ảnh */
        .polaroid.flipped { 
            transform: translate(0, 0) scale(2.5) rotate(0deg) !important; 
            z-index: 999 !important; 
            box-shadow: 0 10px 30px rgba(255,20,147,0.5); 
        }

        /* ================= TỌA ĐỘ MỚI TỐI ƯU ================= */
        /* 1. Trạng thái rải rác lúc đầu (Mở rộng phạm vi để tràn ngập màn hình) */
        .pos-1 { transform: translate(-100px, -160px) rotate(-15deg) scale(0.9); opacity: 1; }
        .pos-2 { transform: translate(110px, -150px) rotate(10deg) scale(0.9); opacity: 1; }
        .pos-3 { transform: translate(-120px, 0px) rotate(-5deg) scale(0.9); opacity: 1; }
        .pos-4 { transform: translate(130px, -20px) rotate(20deg) scale(0.9); opacity: 1; }
        .pos-5 { transform: translate(-90px, 150px) rotate(-25deg) scale(0.9); opacity: 1; }
        .pos-6 { transform: translate(100px, 140px) rotate(15deg) scale(0.9); opacity: 1; }
        .pos-7 { transform: translate(-40px, -100px) rotate(8deg) scale(0.9); opacity: 1; }
        .pos-8 { transform: translate(50px, -80px) rotate(-12deg) scale(0.9); opacity: 1; }
        .pos-9 { transform: translate(-60px, 60px) rotate(14deg) scale(0.9); opacity: 1; }
        .pos-10 { transform: translate(60px, 80px) rotate(-18deg) scale(0.9); opacity: 1; }
        .pos-11 { transform: translate(-20px, -20px) rotate(-5deg) scale(0.9); opacity: 1; }
        .pos-12 { transform: translate(10px, 180px) rotate(7deg) scale(0.9); opacity: 1; }

        /* 2. Trạng thái xếp thành hình Trái Tim (Rộng, thoáng, không bị ép) */
        .heart-pos-1 { transform: translate(-90px, -125px) rotate(-22deg) scale(0.9); z-index: 2; opacity: 1;}
        .heart-pos-2 { transform: translate(-30px, -150px) rotate(-10deg) scale(0.9); z-index: 1; opacity: 1;}
        .heart-pos-3 { transform: translate(40px, -150px) rotate(10deg) scale(0.9); z-index: 1; opacity: 1;}
        .heart-pos-4 { transform: translate(100px, -125px) rotate(22deg) scale(0.9); z-index: 2; opacity: 1;}
        
        .heart-pos-5 { transform: translate(-135px, -35px) rotate(-15deg) scale(0.9); z-index: 3; opacity: 1;}
        .heart-pos-6 { transform: translate(-50px, -50px) rotate(-5deg) scale(0.9); z-index: 2; opacity: 1;}
        .heart-pos-7 { transform: translate(60px, -50px) rotate(5deg) scale(0.9); z-index: 2; opacity: 1;}
        .heart-pos-8 { transform: translate(145px, -35px) rotate(15deg) scale(0.9); z-index: 3; opacity: 1;}
        
        .heart-pos-9 { transform: translate(-85px, 65px) rotate(-10deg) scale(0.9); z-index: 4; opacity: 1;}
        .heart-pos-10 { transform: translate(95px, 65px) rotate(10deg) scale(0.9); z-index: 4; opacity: 1;}
        
        .heart-pos-11 { transform: translate(-30px, 155px) rotate(-6deg) scale(0.9); z-index: 5; opacity: 1;}
        .heart-pos-12 { transform: translate(40px, 155px) rotate(6deg) scale(0.9); z-index: 5; opacity: 1;}

        /* Responsive cho máy tính to hơn */
        @media (min-width: 768px) {
            .polaroid { width: 120px; height: 150px; margin-top: -75px; margin-left: -60px; }
            #message1 { font-size: 45px; }
            #final-message { font-size: 65px; bottom: 12%; }
            
            .heart-pos-1 { transform: translate(-130px, -160px) rotate(-22deg) scale(1); }
            .heart-pos-2 { transform: translate(-40px, -190px) rotate(-10deg) scale(1); }
            .heart-pos-3 { transform: translate(50px, -190px) rotate(10deg) scale(1); }
            .heart-pos-4 { transform: translate(140px, -160px) rotate(22deg) scale(1); }
            .heart-pos-5 { transform: translate(-180px, -40px) rotate(-15deg) scale(1); }
            .heart-pos-6 { transform: translate(-65px, -60px) rotate(-5deg) scale(1); }
            .heart-pos-7 { transform: translate(75px, -60px) rotate(5deg) scale(1); }
            .heart-pos-8 { transform: translate(190px, -40px) rotate(15deg) scale(1); }
            .heart-pos-9 { transform: translate(-110px, 90px) rotate(-10deg) scale(1); }
            .heart-pos-10 { transform: translate(120px, 90px) rotate(10deg) scale(1); }
            .heart-pos-11 { transform: translate(-40px, 200px) rotate(-6deg) scale(1); }
            .heart-pos-12 { transform: translate(50px, 200px) rotate(6deg) scale(1); }
        }

        /* Hiệu ứng trái tim theo chuột/vuốt */
        .mouse-heart {
            position: absolute; pointer-events: none; font-size: 20px; color: #ff2a70; z-index: 9999;
            transform: translate(-50%, -50%); animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -150%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="nhac.mp3" loop></audio>
    <div class="snow"></div>

    <div id="gift-container" onclick="openGift()">
        <div class="gift-box">🎁</div>
        <div class="click-text">Chạm để mở quà nhé! ❤️</div>
    </div>

    <div id="main-content">
        <div id="message1"></div>
        
        <div class="gallery" id="gallery">
            <div class="polaroid" id="p1" onclick="flipImage(this)"><img src="anh1.jpg" alt="Ảnh 1"></div>
            <div class="polaroid" id="p2" onclick="flipImage(this)"><img src="anh2.jpg" alt="Ảnh 2"></div>
            <div class="polaroid" id="p3" onclick="flipImage(this)"><img src="anh3.jpg" alt="Ảnh 3"></div>
            <div class="polaroid" id="p4" onclick="flipImage(this)"><img src="anh4.jpg" alt="Ảnh 4"></div>
            <div class="polaroid" id="p5" onclick="flipImage(this)"><img src="anh5.jpg" alt="Ảnh 5"></div>
            <div class="polaroid" id="p6" onclick="flipImage(this)"><img src="anh6.jpg" alt="Ảnh 6"></div>
            <div class="polaroid" id="p7" onclick="flipImage(this)"><img src="anh7.jpg" alt="Ảnh 7"></div>
            <div class="polaroid" id="p8" onclick="flipImage(this)"><img src="anh8.jpg" alt="Ảnh 8"></div>
            <div class="polaroid" id="p9" onclick="flipImage(this)"><img src="anh9.jpg" alt="Ảnh 9"></div>
            <div class="polaroid" id="p10" onclick="flipImage(this)"><img src="anh10.jpg" alt="Ảnh 10"></div>
            <div class="polaroid" id="p11" onclick="flipImage(this)"><img src="anh11.jpg" alt="Ảnh 11"></div>
            <div class="polaroid" id="p12" onclick="flipImage(this)"><img src="anh12.jpg" alt="Ảnh 12"></div>
        </div>

        <div id="final-message"></div>
    </div>

    <script>
        const introLines = [
            "Chào cô gái đáng yêu nhất của anh, người đang mở chiếc hộp bí mật này... ✨",
            "Anh vốn không phải là một người giỏi nói những lời hoa mỹ ngọt ngào...",
            "Nhưng mỗi khoảnh khắc được nhìn thấy nụ cười của em đều làm anh hạnh phúc. 💖",
            "Cảm ơn em vì đã đến, đã luôn bao dung và mang ánh sáng tới cuộc đời anh.",
            "Bây giờ, hãy cùng anh ngắm nhìn những khoảnh khắc xinh đẹp và đáng yêu nhất của em nhé! 👇"
        ];

        let currentLine = 0;

        function openGift() {
            document.getElementById('bg-music').play().catch(e => console.log("Cần tương tác để phát nhạc"));
            const giftContainer = document.getElementById('gift-container');
            giftContainer.style.transform = 'scale(0)';
            giftContainer.style.opacity = '0';
            
            setTimeout(() => {
                giftContainer.style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                showIntroLines(); 
            }, 500);
        }

        function showIntroLines() {
            const msgEl = document.getElementById("message1");
            if (currentLine < introLines.length) {
                msgEl.innerHTML = introLines[currentLine];
                msgEl.style.opacity = 1; 
                
                setTimeout(() => {
                    msgEl.style.opacity = 0; 
                    setTimeout(() => {
                        currentLine++;
                        showIntroLines(); 
                    }, 1000); 
                }, 3000); 
            } else {
                showPhotos(); 
            }
        }

        // Logic điều khiển Class mượt mà
        function showPhotos() {
            const photos = document.querySelectorAll('.polaroid');
            photos.forEach((photo, index) => {
                setTimeout(() => {
                    photo.classList.add(`pos-${index + 1}`);
                }, index * 200); 
            });
            setTimeout(formHeart, photos.length * 200 + 1000);
        }

        function formHeart() {
            const photos = document.querySelectorAll('.polaroid');
            photos.forEach((photo, index) => {
                photo.classList.remove(`pos-${index + 1}`);
                photo.classList.add(`heart-pos-${index + 1}`);
            });
            setTimeout(fireworksAndFinalText, 1500);
        }

        function fireworksAndFinalText() {
            const finalMsg = document.getElementById('final-message');
            
            finalMsg.innerHTML = "Anh muốn nói với em...";
            finalMsg.style.opacity = '1';
            
            var defaults = { spread: 360, ticks: 100, gravity: 0, decay: 0.94, startVelocity: 30, shapes: ['heart'], colors: ['FF1493', 'FF0000', 'FF69B4'] };
            confetti({ ...defaults, particleCount: 50, origin: { x: 0.5, y: 0.5 } });
            
            setTimeout(() => {
                finalMsg.style.opacity = '0';
                setTimeout(() => {
                    finalMsg.innerHTML = "I Love You ❤️";
                    finalMsg.style.opacity = '1';
                    
                    setInterval(() => {
                        confetti({ particleCount: 15, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0055', '#ffffff'] });
                        confetti({ particleCount: 15, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0055', '#ffffff'] });
                    }, 2500);
                }, 1000);
            }, 3000);
        }

        function flipImage(element) {
            if (element.classList.contains('flipped')) {
                element.classList.remove('flipped');
            } else {
                document.querySelectorAll('.polaroid').forEach(p => p.classList.remove('flipped'));
                element.classList.add('flipped');
            }
        }

        // Hàm tạo trái tim cho cả Chuột và Vuốt
        function spawnHeart(x, y) {
            if(Math.random() > 0.8) return; 
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'mouse-heart';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            const size = Math.floor(Math.random() * 15) + 10;
            heart.style.fontSize = size + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 1000);
        }

        document.addEventListener('mousemove', function(e) {
            spawnHeart(e.pageX, e.pageY);
        });

        document.addEventListener('touchmove', function(e) {
            const touch = e.touches[0];
            spawnHeart(touch.pageX, touch.pageY);
        }, { passive: true }); 
    </script>
</body>
</html>
